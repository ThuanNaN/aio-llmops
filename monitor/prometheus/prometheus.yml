global:
  scrape_interval: 5s
  evaluation_interval: 30s
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
  - job_name: "vllm-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["__VLLM_TARGET__"]
  - job_name: "trtllm-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["__TRTLLM_TARGET__"]
  - job_name: "backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["__BACKEND_TARGET__"]