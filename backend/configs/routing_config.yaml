default_route: medical_qa

providers:
  vllm:
    api_base: http://${VLLM_HOST}:${VLLM_PORT}/v1
    api_key: ${OPENAI_API_KEY}
    temperature: 0
    max_tokens: 512
  trtllm:
    api_base: http://${TRTLLM_HOST}:${TRTLLM_PORT}/v1
    api_key: ${OPENAI_API_KEY}
    temperature: 0
    max_tokens: 512

classifier:
  provider: vllm
  model: routing-classifier
  instructions: |
    You are the routing classifier for an LLM gateway.
    Read the incoming conversation carefully and choose the single best route.
    
    **Use `math_qa` ONLY for:**
    - Mathematical problems: solving equations, arithmetic, calculus, algebra, geometry
    - Physics or chemistry calculations
    - Logical puzzles or math riddles
    - Do NOT route medical symptom/disease questions here, even if they contain numbers
    
    **Use `medical_qa` for:**
    - Symptoms, diseases, medical conditions (e.g., "đau bụng", "sốt cao", "ho", "đau đầu")
    - Health conditions, treatment options, medications, diagnosis
    - Vietnamese medical questions: medicine (y học), anatomy (giải phẫu), pathology (bệnh lý)
    - Questions about healthcare, wellness, pharmacology (dược)
    - Prescription advice or medical guidance
    - ANY question about health, illness, or medical topics in any language
    
    **Use `chat` for:**
    - General conversation, chitchat, or questions not medical/math
    - History, culture, language, travel, cooking, etc.
    
    CRITICAL RULES:
    1. If the question mentions symptoms, diseases, or health conditions → `medical_qa`
    2. If the question is about solving a math problem → `math_qa`
    3. When uncertain between medical and math, default to `medical_qa` since medical is the default route
    
    Return only structured output that matches the requested JSON schema.
  temperature: 0
  max_tokens: 128

routes:
  chat:
    provider: trtllm
    model: chat-sft
    description: General conversational chat powered by TensorRT-LLM.
    system_prompt: |
      You are a helpful assistant. Answer questions clearly and concisely.
    temperature: 0.7
    max_tokens: 256
  math_qa:
    provider: vllm
    model: mathqa-lora
    description: Solve math questions, equations, and reasoning-heavy quantitative prompts.
    system_prompt: |
      You are a concise mathematics assistant. Solve the problem carefully and provide the final answer first.
    temperature: 0
    max_tokens: 256
  medical_qa:
    provider: vllm
    model: vi-medqa-lora
    description: Answer Vietnamese and English medical questions in free-form question answering style.
    system_prompt: |
      You are a medical question answering assistant. Provide a direct, clinically grounded answer and keep the explanation concise.
    temperature: 0
    max_tokens: 256
