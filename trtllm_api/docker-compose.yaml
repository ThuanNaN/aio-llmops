services:
  trtllm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trtllm
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    networks:
      - aio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

networks:
  aio-network:
    external: true