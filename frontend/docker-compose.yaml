services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - open-webui:/app/backend/data
    networks:
      - aio-network
  
  gradio-app:
    build: .
    container_name: gradio-app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-7860}:${FRONTEND_PORT:-7860}"
    env_file:
      - .env
    networks:
      - aio-network

volumes:
  open-webui:

networks:
  aio-network:
    external: true
